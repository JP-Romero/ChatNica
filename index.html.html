<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💬 ChatNica - Mensajería Local</title>
  <meta name="description" content="App de mensajería para Nicaragua - funciona con o sin internet">
  <meta name="theme-color" content="#2D1300">
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- Tailwind CSS (igual que tu PWA) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Firebase (versión modular) -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</head>
<body class="bg-amber-50 min-h-screen flex flex-col">

  <!-- HEADER -->
  <header class="bg-amber-900 text-amber-50 p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex items-center justify-between">
      <h1 class="text-xl font-bold">💬 ChatNica</h1>
      <div class="flex items-center gap-3">
        <span id="connection-status" class="text-sm">🟢 En línea</span>
        <button id="btn-logout" class="text-sm bg-amber-700 hover:bg-amber-600 px-3 py-1 rounded">
          Salir
        </button>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex-1 max-w-4xl mx-auto w-full p-4">
    
    <!-- 🔐 Pantalla de Login (se muestra si no hay usuario) -->
    <section id="login-screen" class="bg-white rounded-lg shadow p-6 max-w-md mx-auto mt-10">
      <h2 class="text-2xl font-bold text-amber-900 mb-4 text-center">Bienvenido a ChatNica</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Tu nombre</label>
          <input type="text" id="username-input" required 
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border"
            placeholder="Ej: María López">
        </div>
        <button type="submit" 
          class="w-full bg-amber-600 hover:bg-amber-700 text-white font-medium py-2 px-4 rounded">
          Entrar al Chat
        </button>
      </form>
      <p class="text-xs text-gray-500 mt-4 text-center">
        Tus mensajes se guardan localmente si no hay internet.
      </p>
    </section>

    <!-- 💬 Pantalla de Chat (se muestra después de login) -->
    <section id="chat-screen" class="hidden flex flex-col h-[calc(100vh-140px)]">
      
      <!-- Lista de mensajes -->
      <div id="messages-container" class="flex-1 overflow-y-auto space-y-3 p-2 bg-white rounded-lg shadow mb-4">
        <!-- Los mensajes se insertan aquí dinámicamente -->
        <div class="text-center text-gray-400 py-8" id="empty-state">
          👋 ¡Escribe tu primer mensaje!
        </div>
      </div>

      <!-- Formulario para enviar mensaje -->
      <form id="message-form" class="flex gap-2">
        <input type="text" id="message-input" 
          class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-500"
          placeholder="Escribe un mensaje..." autocomplete="off" required>
        <button type="submit" 
          class="bg-amber-600 hover:bg-amber-700 text-white px-6 py-2 rounded-lg font-medium transition">
          ➤
        </button>
      </form>

      <!-- Indicador de mensajes pendientes (offline) -->
      <div id="pending-indicator" class="hidden mt-2 text-xs text-amber-700 bg-amber-100 px-3 py-1 rounded">
        📤 <span id="pending-count">0</span> mensaje(s) esperando conexión...
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="bg-amber-900 text-amber-100 text-center py-3 text-sm">
    <p>🇳🇮 ChatNica — Hecho con ❤️ para Nicaragua</p>
  </footer>

  <!-- Registro del Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('✅ SW registrado:', reg.scope))
          .catch(err => console.log('❌ Error SW:', err));
      });
    }
  </script>
</body>
</html>
