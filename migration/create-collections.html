<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatNica - Crear Colecciones PocketBase 0.36</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #60a5fa; margin-bottom: 10px; }
    .status { margin: 15px 0; padding: 12px 16px; border-radius: 8px; font-family: monospace; font-size: 14px; white-space: pre-wrap; word-break: break-all; }
    .status.success { background: #064e3b; border: 1px solid #10b981; color: #6ee7b7; }
    .status.error { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }
    .status.info { background: #1e3a5f; border: 1px solid #3b82f6; color: #93c5fd; }
    .status.pending { background: #422006; border: 1px solid #f59e0b; color: #fcd34d; }
    #log { margin-top: 20px; max-height: 500px; overflow-y: auto; }
    button { background: #3b82f6; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 5px 10px 0; }
    button:hover { background: #2563eb; }
    button:disabled { background: #4b5563; cursor: not-allowed; }
    .progress { margin: 15px 0; }
    .progress-bar { height: 8px; background: #374151; border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: #3b82f6; transition: width 0.3s; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ChatNica - Crear Colecciones</h1>
    <p>Script para PocketBase 0.36+ (campos de relacion al nivel superior, sin "options")</p>
    
    <div style="margin: 20px 0;">
      <label>PocketBase URL:</label><br>
      <input type="text" id="pbUrl" value="http://127.0.0.1:8090" style="width: 100%; padding: 8px; margin: 5px 0 15px; background: #1f2937; border: 1px solid #374151; color: #e0e0e0; border-radius: 6px;">
      
      <label>Admin Email:</label><br>
      <input type="text" id="adminEmail" value="mcalebr04@gmail.com" style="width: 100%; padding: 8px; margin: 5px 0 15px; background: #1f2937; border: 1px solid #374151; color: #e0e0e0; border-radius: 6px;">
      
      <label>Admin Password:</label><br>
      <input type="password" id="adminPassword" placeholder="Ingrese la contraseña del administrador" required style="width: 100%; padding: 8px; margin: 5px 0 15px; background: #1f2937; border: 1px solid #374151; color: #e0e0e0; border-radius: 6px;">
    </div>

    <button id="btnRun" onclick="run()">Ejecutar Creación de Colecciones</button>
    <button id="btnClear" onclick="clearLog()" style="background: #6b7280;">Limpiar Log</button>

    <div class="progress" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <span id="progressText" style="font-size: 12px; color: #9ca3af;">0/0</span>
    </div>

    <div id="log"></div>
  </div>

  <script>
    // Helper: relation field for PB 0.36+ (NO "options" wrapper)
    function relationField(name, collectionId, opts = {}) {
      return {
        name,
        type: 'relation',
        collectionId,
        cascadeDelete: opts.cascadeDelete || false,
        maxSelect: opts.maxSelect || 1,
        minSelect: opts.minSelect || 0,
        required: opts.required || false,
      };
    }

    function selectField(name, values, opts = {}) {
      return {
        name,
        type: 'select',
        values,
        maxSelect: opts.maxSelect || 1,
        required: opts.required !== false,
      };
    }

    function textField(name, opts = {}) {
      return { name, type: 'text', required: opts.required || false };
    }

    function fileField(name, opts = {}) {
      return {
        name,
        type: 'file',
        maxSelect: opts.maxSelect || 1,
        maxSize: opts.maxSize || 0,
        mimeTypes: opts.mimeTypes || [],
        required: opts.required || false,
      };
    }

    function jsonField(name) {
      return { name, type: 'json', required: false };
    }

    function boolField(name) {
      return { name, type: 'bool', required: false };
    }

    function dateField(name, opts = {}) {
      return { name, type: 'date', required: opts.required || false };
    }

    async function run() {
      const pbUrl = document.getElementById('pbUrl').value.replace(/\/$/, '');
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const btn = document.getElementById('btnRun');
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');

      btn.disabled = true;
      progressContainer.style.display = 'block';
      clearLog();

      try {
        // Login
        log('Iniciando sesión como admin...', 'info');
        const authRes = await fetch(`${pbUrl}/api/collections/_superusers/auth-with-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identity: email, password: password }),
        });

        if (!authRes.ok) {
          log(`Error de autenticación: ${await authRes.text()}`, 'error');
          btn.disabled = false;
          return;
        }

        const authData = await authRes.json();
        const token = authData.token;
        log('Autenticación exitosa', 'success');

        // Get existing collections
        log('Obteniendo colecciones existentes...', 'info');
        const collectionsRes = await fetch(`${pbUrl}/api/collections`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const collectionsData = await collectionsRes.json();
        const existingCollections = collectionsData.items;

        const usersCollection = existingCollections.find(c => c.name === 'users');
        if (!usersCollection) {
          log('Coleccion "users" no encontrada. Debes crearla primero como auth collection.', 'error');
          btn.disabled = false;
          return;
        }
        const U = usersCollection.id;
        log(`Coleccion "users" encontrada (ID: ${U})`, 'success');

        // Define collections - PB 0.36 format (no "options" wrapper)
        const collections = [
          {
            name: 'contacts',
            type: 'base',
            listRule: '@request.auth.id != ""',
            viewRule: '@request.auth.id != ""',
            createRule: '@request.auth.id != "" && requester = @request.auth.id',
            updateRule: '@request.auth.id != ""',
            deleteRule: '@request.auth.id != ""',
            fields: [
              relationField('requester', U, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
              relationField('target', U, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
              selectField('status', ['pending', 'accepted'], { required: true }),
            ]
          },
          {
            name: 'conversations',
            type: 'base',
            listRule: '@request.auth.id != "" && participants.id ?= @request.auth.id',
            viewRule: '@request.auth.id != "" && participants.id ?= @request.auth.id',
            createRule: '@request.auth.id != "" && participants.id ?= @request.auth.id',
            updateRule: '@request.auth.id != "" && participants.id ?= @request.auth.id',
            deleteRule: '@request.auth.id != "" && createdBy = @request.auth.id',
            fields: [
              selectField('type', ['direct', 'group'], { required: true }),
              relationField('participants', U, { required: true, maxSelect: 100 }),
              textField('name'),
              relationField('createdBy', U, { required: true, maxSelect: 1, minSelect: 1 }),
              textField('lastMessage'),
              dateField('lastMessageTime'),
            ]
          },
          {
            name: 'posts',
            type: 'base',
            listRule: '@request.auth.id != ""',
            viewRule: '@request.auth.id != ""',
            createRule: '@request.auth.id != "" && uid = @request.auth.id',
            updateRule: '@request.auth.id != "" && uid = @request.auth.id',
            deleteRule: '@request.auth.id != "" && uid = @request.auth.id',
            fields: [
              relationField('uid', U, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
              textField('text'),
              fileField('images', { maxSelect: 10, maxSize: 5242880, mimeTypes: ['image/jpeg','image/png','image/gif','image/webp'] }),
              jsonField('likes'),
              jsonField('comments'),
            ]
          },
          {
            name: 'stories',
            type: 'base',
            listRule: '@request.auth.id != ""',
            viewRule: '@request.auth.id != ""',
            createRule: '@request.auth.id != "" && uid = @request.auth.id',
            updateRule: '@request.auth.id != "" && uid = @request.auth.id',
            deleteRule: '@request.auth.id != "" && uid = @request.auth.id',
            fields: [
              relationField('uid', U, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
              selectField('type', ['image', 'text'], { required: true }),
              fileField('image', { maxSelect: 1, maxSize: 5242880, mimeTypes: ['image/jpeg','image/png','image/gif','image/webp'] }),
              textField('text'),
              dateField('expiresAt', { required: true }),
              jsonField('views'),
            ]
          },
          {
            name: 'presence',
            type: 'base',
            listRule: '@request.auth.id != ""',
            viewRule: '@request.auth.id != ""',
            createRule: '@request.auth.id != "" && user = @request.auth.id',
            updateRule: '@request.auth.id != "" && user = @request.auth.id',
            deleteRule: '@request.auth.id != "" && user = @request.auth.id',
            fields: [
              relationField('user', U, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
              boolField('online'),
              dateField('lastSeen'),
            ],
            indexes: ['CREATE UNIQUE INDEX idx_presence_user ON presence (user)']
          },
        ];

        let collectionIds = {};
        const totalSteps = collections.length + 3;
        let currentStep = 0;

        const updateProgress = () => {
          currentStep++;
          const pct = Math.round((currentStep / totalSteps) * 100);
          progressFill.style.width = `${pct}%`;
          progressText.textContent = `${currentStep}/${totalSteps}`;
        };

        // Create collections that only depend on users
        for (const c of collections) {
          const existing = existingCollections.find(col => col.name === c.name);
          if (existing) {
            log(`Coleccion "${c.name}" ya existe, saltando`, 'info');
            collectionIds[c.name] = existing.id;
            updateProgress();
            continue;
          }

          log(`Creando coleccion "${c.name}"...`, 'pending');
          
          const createRes = await fetch(`${pbUrl}/api/collections`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              name: c.name,
              type: c.type,
              listRule: c.listRule,
              viewRule: c.viewRule,
              createRule: c.createRule,
              updateRule: c.updateRule,
              deleteRule: c.deleteRule,
              fields: c.fields,
              indexes: c.indexes || [],
            }),
          });

          if (!createRes.ok) {
            const error = await createRes.text();
            log(`Error creando "${c.name}": ${error}`, 'error');
          } else {
            const result = await createRes.json();
            collectionIds[c.name] = result.id;
            log(`"${c.name}" creada (ID: ${result.id})`, 'success');
          }
          updateProgress();
        }

        // Create messages collection
        const C = collectionIds.conversations || existingCollections.find(c => c.name === 'conversations')?.id;
        if (!C) {
          log('No se encontro la coleccion "conversations"', 'error');
          btn.disabled = false;
          return;
        }

        const existingMessages = existingCollections.find(c => c.name === 'messages');
        if (existingMessages) {
          log('Coleccion "messages" ya existe', 'info');
          collectionIds.messages = existingMessages.id;
        } else {
          log('Creando coleccion "messages"...', 'pending');
          
          const messagesFields = [
            relationField('conversation', C, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
            textField('text'),
            fileField('image', { maxSelect: 1, maxSize: 10485760, mimeTypes: ['image/jpeg','image/png','image/gif','image/webp'] }),
            fileField('video', { maxSelect: 1, maxSize: 10485760, mimeTypes: ['video/mp4','video/webm','video/quicktime'] }),
            fileField('audio', { maxSelect: 1, maxSize: 10485760, mimeTypes: ['audio/*'] }),
            relationField('user', U, { required: true, maxSelect: 1, minSelect: 1 }),
            relationField('replyTo', C, { maxSelect: 1 }), // temp: point to conversations, will fix later
            textField('replyToUserName'),
            jsonField('reactions'),
            selectField('status', ['sent', 'delivered', 'read']),
          ];

          const createRes = await fetch(`${pbUrl}/api/collections`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              name: 'messages',
              type: 'base',
              listRule: '@request.auth.id != ""',
              viewRule: '@request.auth.id != ""',
              createRule: '@request.auth.id != "" && user = @request.auth.id',
              updateRule: '@request.auth.id != ""',
              deleteRule: '@request.auth.id != "" && user = @request.auth.id',
              fields: messagesFields,
            }),
          });

          if (!createRes.ok) {
            log(`Error creando "messages": ${await createRes.text()}`, 'error');
          } else {
            const result = await createRes.json();
            collectionIds.messages = result.id;
            log(`"messages" creada (ID: ${result.id})`, 'success');
          }
        }
        updateProgress();

        // Create typing collection
        const existingTyping = existingCollections.find(c => c.name === 'typing');
        if (existingTyping) {
          log('Coleccion "typing" ya existe', 'info');
          collectionIds.typing = existingTyping.id;
        } else {
          log('Creando coleccion "typing"...', 'pending');
          
          const createRes = await fetch(`${pbUrl}/api/collections`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({
              name: 'typing',
              type: 'base',
              listRule: '@request.auth.id != ""',
              viewRule: '@request.auth.id != ""',
              createRule: '@request.auth.id != ""',
              updateRule: '@request.auth.id != ""',
              deleteRule: '@request.auth.id != ""',
              fields: [
                relationField('conversation', C, { required: true, cascadeDelete: true, maxSelect: 1, minSelect: 1 }),
                jsonField('typers'),
              ],
              indexes: ['CREATE UNIQUE INDEX idx_typing_conv ON typing (conversation)']
            }),
          });

          if (!createRes.ok) {
            log(`Error creando "typing": ${await createRes.text()}`, 'error');
          } else {
            const result = await createRes.json();
            collectionIds.typing = result.id;
            log(`"typing" creada (ID: ${result.id})`, 'success');
          }
        }
        updateProgress();

        // Fix messages.replyTo to point to messages (self-reference)
        const M = collectionIds.messages || existingCollections.find(c => c.name === 'messages')?.id;
        if (M) {
          log('Corrigiendo messages.replyTo -> messages (auto-referencia)...', 'info');
          
          const getRes = await fetch(`${pbUrl}/api/collections/${M}`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const col = await getRes.json();

          const updatedFields = col.fields.map(f => {
            if (f.name === 'replyTo' && f.type === 'relation') {
              return { ...f, collectionId: M };
            }
            return f;
          });

          const updateRes = await fetch(`${pbUrl}/api/collections/${M}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ fields: updatedFields }),
          });

          if (!updateRes.ok) {
            log(`Error corrigiendo replyTo: ${await updateRes.text()}`, 'error');
          } else {
            log('messages.replyTo corregido -> messages', 'success');
          }
        }
        updateProgress();

        log('\nTodas las colecciones han sido creadas exitosamente!', 'success');
        log('\nResumen de colecciones:', 'info');
        log(`  users: ${U}`, 'info');
        for (const [name, id] of Object.entries(collectionIds)) {
          log(`  ${name}: ${id}`, 'info');
        }

      } catch (e) {
        log(`Error fatal: ${e.message}`, 'error');
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    }

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `status ${type}`;
      entry.textContent = message;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }
  </script>
</body>
</html>
