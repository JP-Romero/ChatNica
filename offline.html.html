<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📴 Sin Conexión — ChatNica</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-white rounded-xl shadow-lg p-8 max-w-md text-center">
    <div class="text-6xl mb-4">📴</div>
    <h1 class="text-2xl font-bold text-amber-900 mb-2">Sin Conexión</h1>
    <p class="text-gray-600 mb-6">
      No hay internet en este momento, pero no te preocupes:
    </p>
    
    <ul class="text-left text-sm text-gray-700 space-y-2 mb-6">
      <li>✅ Tus mensajes se guardan automáticamente</li>
      <li>✅ Podrás seguir escribiendo sin problemas</li>
      <li>✅ Se enviarán solos cuando regreses en línea</li>
    </ul>
    
    <button onclick="window.location.reload()" 
      class="bg-amber-600 hover:bg-amber-700 text-white font-medium py-2 px-6 rounded-lg transition">
      🔄 Reintentar
    </button>
    
    <p class="text-xs text-gray-400 mt-6">
      🇳🇮 ChatNica — Hecho para Nicaragua
    </p>
  </div>

</body>
</html>
