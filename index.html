<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>💬 ChatNica</title>
  <meta name="description" content="Mensajería real para Nicaragua - funciona con o sin internet">
  <meta name="theme-color" content="#001030">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nica: {
              primary: '#0066FF', // Azul vibrante (visto en el icono)
              secondary: '#00A3FF',
              bg:      '#F0F4F9', // Fondo claro y moderno
              surface: '#FFFFFF',
              text:    '#1C1E21',
              muted:   '#65676B',
            }
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css">

  <script type="module" src="app.js"></script>
</head>

<body class="bg-nica-bg text-nica-text" style="height:100dvh;display:flex;flex-direction:column;overflow:hidden">

<!-- ══════════════════════════════════════
  HEADER
══════════════════════════════════════ -->
<header class="bg-nica-primary shadow-md flex-shrink-0 z-20">
  <div class="header-inner">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <span class="text-lg font-black tracking-tight text-white">💬 ChatNica</span>
    </div>
    <!-- Center: user info -->
    <div class="flex items-center gap-2 min-w-0">
      <div id="header-avatar" class="header-avatar border-2 border-white/20 cursor-pointer"></div>
      <div class="flex flex-col">
        <span id="header-name" class="text-sm font-semibold text-white truncate max-w-[120px] hidden sm:block leading-none"></span>
        <button id="btn-show-online" class="text-[10px] text-green-300 font-bold hover:text-white transition-colors text-left hidden"></button>
      </div>
    </div>
    <!-- Right: status + logout -->
    <div class="flex items-center gap-3">
      <span id="connection-status" class="text-sm font-medium text-green-400 hidden sm:block"></span>
      <button id="btn-logout"
        class="hidden text-xs bg-white/10 hover:bg-white/20 text-white px-3 py-1.5 rounded-lg transition border border-white/10">
        Salir
      </button>
    </div>
  </div>
</header>

<!-- ══════════════════════════════════════
  LOADING SCREEN
══════════════════════════════════════ -->
<div id="loading-screen" class="flex-1 flex flex-col items-center justify-center gap-4">
  <div class="w-10 h-10 rounded-full border-2 border-nica-primary/20 border-t-nica-primary animate-spin"></div>
  <p class="text-nica-muted text-sm tracking-wide font-medium">ChatNica conectando…</p>
</div>

<!-- ══════════════════════════════════════
  AUTH SCREEN
══════════════════════════════════════ -->
<div id="auth-screen" class="hidden flex-1 flex items-center justify-center p-4 overflow-y-auto">
  <div class="auth-card">

    <div class="text-center mb-8">
      <div class="text-4xl mb-2">💬</div>
      <h1 class="text-2xl font-black text-nica-primary tracking-tight">ChatNica</h1>
      <p class="text-nica-muted text-sm mt-1">Conectando comunidades</p>
    </div>

    <!-- ── LOGIN VIEW ─────────────────────── -->
    <div id="login-view">
      <!-- Google -->
      <button id="btn-google" class="auth-btn-google">
        <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continuar con Google
      </button>

      <div class="auth-divider"><span>o</span></div>

      <!-- Email / Password -->
      <div class="space-y-3">
        <input id="login-email" type="email" placeholder="Correo electrónico"
          class="auth-input" autocomplete="email">
        <input id="login-password" type="password" placeholder="Contraseña"
          class="auth-input" autocomplete="current-password">
        <div id="login-error" class="auth-error hidden"></div>
        <button id="login-btn" class="auth-btn-primary">Iniciar sesión</button>
      </div>

      <div class="flex items-center justify-between mt-4">
        <button id="show-register" class="auth-link">Crear cuenta nueva</button>
        <button id="btn-guest" class="auth-link text-nica-muted">Entrar como invitado</button>
      </div>
    </div>

    <!-- ── REGISTER VIEW ──────────────────── -->
    <div id="register-view" class="hidden">
      <h2 class="text-lg font-bold text-white mb-5 text-center">Crear cuenta</h2>
      <div class="space-y-3">
        <input id="reg-name" type="text" placeholder="Tu nombre"
          class="auth-input" autocomplete="name">
        <input id="reg-email" type="email" placeholder="Correo electrónico"
          class="auth-input" autocomplete="email">
        <input id="reg-password" type="password" placeholder="Contraseña (mín. 6 caracteres)"
          class="auth-input" autocomplete="new-password">
        <div id="reg-error" class="auth-error hidden"></div>
        <button id="reg-btn" class="auth-btn-primary">Crear cuenta</button>
      </div>
      <div class="text-center mt-4">
        <button id="show-login" class="auth-link">Ya tengo cuenta</button>
      </div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════
  CHAT SCREEN
══════════════════════════════════════ -->
<section id="chat-screen" class="hidden flex-1 flex flex-col overflow-hidden">

  <!-- Channel bar -->
  <div id="channels-bar" class="bg-white border-b border-gray-200 flex overflow-x-auto p-2 gap-2 scrollbar-hide">
    <button data-channel="general"   class="channel-btn active"># General</button>
    <button data-channel="ayuda"     class="channel-btn"># Ayuda</button>
    <button data-channel="comunidad" class="channel-btn"># Comunidad</button>
    <button data-channel="noticias"  class="channel-btn"># Noticias</button>
    <button data-channel="fotos"     class="channel-btn"># Fotos</button>
  </div>

  <!-- Load more -->
  <div class="flex-shrink-0 flex justify-center py-2 px-4 bg-transparent">
    <button id="load-more-btn" class="load-more-btn hidden">↑ Mensajes anteriores</button>
  </div>

  <!-- Messages -->
  <div id="messages-container" class="flex-1 overflow-y-auto px-4 py-2 space-y-3" style="overscroll-behavior:contain">
    <div id="empty-state" class="text-center text-nica-muted/40 py-16">
      <p class="text-5xl mb-3">👋</p>
      <p class="text-sm">¡Sé el primero en escribir aquí!</p>
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typing-indicator" class="hidden flex-shrink-0 flex items-center gap-2 px-4 pb-1">
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
    <span id="typing-text" class="text-xs text-nica-muted italic"></span>
  </div>

  <!-- Reply preview -->
  <div id="reply-preview" class="hidden flex-shrink-0 bg-gray-100 border-l-4 border-nica-primary px-4 py-2">
    <div class="flex-1 min-w-0">
      <span class="text-xs font-semibold text-nica-primary">↩ </span>
      <span id="reply-user" class="text-xs font-bold text-nica-primary"></span>
      <p id="reply-text" class="text-xs text-nica-muted truncate"></p>
    </div>
    <button id="cancel-reply" class="text-nica-muted hover:text-red-500 flex-shrink-0 text-lg ml-2">✕</button>
  </div>

  <!-- Input area -->
  <div class="flex-shrink-0 bg-white border-t border-gray-200 p-2 pb-safe">
    <form id="message-form" class="input-row">
      <!-- Image button -->
      <label for="image-input"
        class="p-2 text-nica-muted hover:text-nica-primary transition-colors flex-shrink-0" title="Adjuntar imagen">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <input type="file" id="image-input" class="hidden" accept="image/jpeg,image/png,image/gif,image/webp">
      </label>

      <!-- Mic button -->
      <button type="button" id="mic-btn" class="p-2 text-nica-muted hover:text-nica-primary transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
        </svg>
      </button>

      <!-- Text input -->
      <input type="text" id="message-input" placeholder="Mensaje..." autocomplete="off"
        class="flex-1 bg-gray-100 border-none rounded-full px-4 py-2 text-sm focus:ring-2 focus:ring-nica-primary transition-all">

      <!-- Send button -->
      <button type="submit" id="btn-send" class="bg-nica-primary text-white p-2 rounded-full hover:bg-nica-secondary transition-all flex-shrink-0 shadow-sm ml-1">
        <svg id="send-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 rotate-45" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
        <div id="send-loading" class="hidden w-5 h-5 rounded-full border-2 border-white/30 border-t-white animate-spin"></div>
      </button>
    </form>

    <!-- File preview -->
    <div id="file-preview" class="hidden flex items-center gap-2 bg-nica-bg p-2 rounded-lg mt-2">
      <svg class="w-4 h-4 flex-shrink-0 text-nica-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/>
      </svg>
      <span id="file-preview-name" class="text-xs text-nica-muted truncate flex-1 font-medium"></span>
      <button id="file-clear-btn" class="text-red-400 hover:text-red-300 text-sm flex-shrink-0">✕</button>
    </div>

    <!-- Recording status -->
    <div id="recording-bar" class="hidden absolute inset-0 bg-white flex items-center justify-between px-4 z-10 border-t border-gray-200">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
        <span id="recording-timer" class="text-xs font-mono">00:00</span>
      </div>
      <button id="stop-rec-btn" class="text-xs font-bold text-red-500 uppercase tracking-widest">Detener y Enviar</button>
    </div>
  </div>

  <!-- Pending offline indicator -->
  <div id="pending-indicator"
    class="hidden flex-shrink-0 flex items-center gap-2 text-xs text-nica-primary
           bg-nica-bg border-t border-gray-200 px-4 py-2">
    <span>📤</span>
    <span id="pending-count">0</span> mensaje(s) esperando conexión…
  </div>

</section>

<!-- ══════════════════════════════════════
  USER LIST MODAL
══════════════════════════════════════ -->
<div id="user-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
  <div class="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden animate-popIn">
    <div class="bg-nica-primary p-4 flex justify-between items-center text-white">
      <h3 class="font-bold">Usuarios en línea</h3>
      <button id="close-user-modal" class="text-white/80 hover:text-white text-xl">✕</button>
    </div>
    <div id="user-list-container" class="max-h-[60vh] overflow-y-auto p-2">
      <!-- Se llena dinámicamente -->
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
  REACTION POPOVER (global floating)
══════════════════════════════════════ -->
<div id="reaction-popover" class="reaction-popover hidden">
  <button data-emoji="👍">👍</button>
  <button data-emoji="❤️">❤️</button>
  <button data-emoji="😂">😂</button>
  <button data-emoji="😮">😮</button>
  <button data-emoji="😢">😢</button>
  <button data-emoji="🙏">🙏</button>
</div>

<!-- ══════════════════════════════════════
  TOAST NOTIFICATION
══════════════════════════════════════ -->
<div id="toast" class="toast">
  <span id="toast-message"></span>
</div>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(r => console.log('✅ SW:', r.scope))
        .catch(e => console.warn('SW error:', e));
    });
  }
</script>

</body>
</html>
